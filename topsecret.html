<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Secret Project</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    .yes {
      background: #ff4d6d;
      color: white;
    }

    .no {
      background: #4d96ff;
      color: white;
    }

    .message {
      display: none;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .message h2 {
      font-size: 2rem;
    }

    img {
      max-width: 300px;
      border-radius: 16px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div id="question">
      <h1>Is this Liz?</h1>

      <div class="buttons">
        <button class="yes" onclick="showMessage()">Yes</button>
        <button class="no" onclick="goToSheet()">No</button>
      </div>
    </div>

    <div id="message" class="message">
      <h2>Nice Try, I Love You ❤️</h2>

      <!-- Optional image -->
      <!-- Replace with your own image URL -->
      <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="Nice Try">
    </div>

  </div>

  <script>
    function showMessage() {
      document.getElementById("question").style.display = "none";
      document.getElementById("message").style.display = "flex";
    }

    function goToSheet() {
      window.location.href = "https://docs.google.com/spreadsheets/d/1Sao9oRzkAr7zA5UAEeJqhID0kB5qGQc2V4BPpqn2Xn8/edit?gid=0#gid=0";
    }
  </script>

</body>
</html>

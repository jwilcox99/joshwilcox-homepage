<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Hencox Library</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f4efe6;
      color: #2d241b;
      padding: 24px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      background: #fffaf1;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #c7b9a3;
      font-size: 1rem;
    }

    button {
      margin-top: 22px;
      background: #5c3b24;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>📚 The Hencox Library</h1>
    <p>Add a book to the family library.</p>

    <form id="bookForm" onsubmit="return false;">
      <button type="button" id="scanButton">Scan Barcode</button>
      <div id="scanner" style="display:none; margin-top:16px;"></div>

      <label>Title</label>
      <input name="title" required />

      <label>Authors</label>
      <input name="authors" />

      <label>Status</label>
      <select name="status" id="status"></select>

      <label>Shelf / Location</label>
      <select name="location" id="location"></select>

      <label>Rating</label>
      <input name="rating" type="number" min="0" max="5" step="0.25" />

      <label>Genre</label>
      <select name="genre" id="genre"></select>

      <label>Favorite</label>
      <select name="favorite" id="favorite"></select>

      <label>Notes</label>
      <textarea name="notes"></textarea>

      <label>ISBN-13</label>
      <input name="isbn13" />

      <button type="button" id="submitBook">Add Book</button>
    </form>

    <div class="status" id="message"></div>
  </main>

<script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzHY0oyoG30CjNb02V4Dtz2rLpjOwb1KMt55MtjZZU-sr58ugWtO3EvGYbqjE99wlSj/exec";

    const form = document.getElementById("bookForm");
    const message = document.getElementById("message");
    const submitButton = document.getElementById("submitBook");

    const scanButton = document.getElementById("scanButton");
    let html5QrCode = null;

async function lookupBookByIsbn(isbn) {
  const cleaned = isbn.replace(/[^0-9Xx]/g, "");

  if (!(cleaned.length === 13 && (cleaned.startsWith("978") || cleaned.startsWith("979"))) && cleaned.length !== 10) {
    message.textContent = `Scanned ${cleaned}, but that does not look like an ISBN. Try again.`;
    return;
  }

  message.textContent = `Looking up ISBN ${cleaned}...`;

  const url = `https://openlibrary.org/isbn/${cleaned}.json`;
  console.log("Trying Open Library:", url);

  const res = await fetch(url);

  if (!res.ok) {
    message.textContent = `ISBN ${cleaned} not found. Try scanning again or enter manually.`;
    return;
  }

  const data = await res.json();
  console.log("Open Library result:", data);

  form.elements["title"].value = data.title || "";
  form.elements["authors"].value = "";
  form.elements["isbn13"].value = cleaned;
  form.elements["publisher"].value = data.publishers ? data.publishers.join(", ") : "";

  message.textContent = `Found: ${data.title || "book"}`;
}

  function isbn13To10(isbn13) {
    if (!isbn13.startsWith("978") || isbn13.length !== 13) return "";

    const core = isbn13.substring(3, 12);
    let sum = 0;

    for (let i = 0; i < 9; i++) {
      sum += Number(core[i]) * (10 - i);
    }

    const check = 11 - (sum % 11);
    const checkDigit = check === 10 ? "X" : check === 11 ? "0" : String(check);

    return core + checkDigit;
  }

  function isbn10To13(isbn10) {
    if (isbn10.length !== 10) return "";

    const core = "978" + isbn10.substring(0, 9);
    let sum = 0;
  
    for (let i = 0; i < 12; i++) {
      sum += Number(core[i]) * (i % 2 === 0 ? 1 : 3);
    }

    const checkDigit = (10 - (sum % 10)) % 10;

    return core + String(checkDigit);
  }

    async function loadSettings() {
      try {
        message.textContent = "Loading settings...";

        const res = await fetch(`${API_URL}?action=settings`);
        const data = await res.json();

        console.log("Settings loaded:", data);

        const settings = data.settings || {};

        fillSelect("status", settings.Status || []);
        fillSelect("location", settings.Location || settings["Shelf / Location"] || []);
        fillSelect("genre", settings.Genre || []);
        fillSelect("favorite", settings.Favorite || []);

        message.textContent = "";
      } catch (err) {
        console.error("Settings error:", err);
        message.textContent = "Could not load settings: " + err.message;
      }
    }

    function fillSelect(id, values = []) {
      const select = document.getElementById(id);
      select.innerHTML = "";

      const blank = document.createElement("option");
      blank.value = "";
      blank.textContent = "";
      select.appendChild(blank);

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    scanButton.addEventListener("click", async () => {
      const scannerDiv = document.getElementById("scanner");

      try {
        scannerDiv.style.display = "block";
        message.textContent = "Starting camera...";

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("scanner");
      }

      await html5QrCode.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width: 260, height: 160 }
        },
        async (decodedText) => {
          const isbn = decodedText.replace(/[^0-9Xx]/g, "");

          if (isbn.length < 10) return;

          await html5QrCode.stop();
          scannerDiv.style.display = "none";

          await lookupBookByIsbn(isbn);
      }
    );

      message.textContent = "Point camera at the book barcode.";
    } catch (err) {
      console.error("Scanner error:", err);
      scanButton.addEventListener("click", async () => {
  const scannerDiv = document.getElementById("scanner");

  try {
    scannerDiv.style.display = "block";
    message.textContent = "Starting camera...";

    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("scanner");
    }

    await html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 260, height: 160 }
      },
      async (decodedText) => {
        const isbn = decodedText.replace(/[^0-9Xx]/g, "");

        if (isbn.length < 10) return;

        await html5QrCode.stop();
        scannerDiv.style.display = "none";

        await lookupBookByIsbn(isbn);
      }
    );

    message.textContent = "Point camera at the book barcode.";
  } catch (err) {
    console.error("Scanner error:", err);
    message.textContent = "Could not start scanner: " + err.message;
  }
});message.textContent = "Could not start scanner: " + err.message;
  }
});

    submitButton.addEventListener("click", async () => {
      try {
        if (!form.reportValidity()) return;

        message.textContent = "Adding book...";
        submitButton.disabled = true;

        const formData = new FormData(form);

        const book = {
          title: formData.get("title"),
          authors: formData.get("authors"),
          status: formData.get("status"),
          location: formData.get("location"),
          rating: formData.get("rating"),
          genre: formData.get("genre"),
          favorite: formData.get("favorite"),
          notes: formData.get("notes"),
          isbn13: formData.get("isbn13")
        };

        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "addBook",
            book
          })
        });

        const result = await res.json();
        console.log("Add result:", result);

        if (result.ok) {
          message.textContent = `Added ${result.title || "book"} as ${result.bookId}`;
          form.reset();
        } else {
          message.textContent = `Error: ${result.error || "Unknown error"}`;
        }
      } catch (err) {
        console.error("Submit error:", err);
        message.textContent = "Could not add book: " + err.message;
      } finally {
        submitButton.disabled = false;
      }
    });

    loadSettings();
  </script>
</body>
</html>

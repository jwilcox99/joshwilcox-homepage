<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Hencox Library</title>

  <link rel="manifest" href="/library/manifest.json">
  <meta name="theme-color" content="#5c3b24">
  <link rel="apple-touch-icon" href="/library/icons/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="The Hencox Library">
  <link rel="stylesheet" href="/library/style.css"> 
</head>

<body>
<main class="app">
  <h1>📚 The Hencox Library</h1>
  <p>Explore the family library.</p>

  <section id="homeScreen">
    <button type="button" id="homeScanButton">📷 Scan Book</button>
    <button type="button" id="homeAddButton">✏️ Add Manually</button>
    <button type="button" id="homeLibraryButton">📚 View Library</button>
    <button type="button" id="homeFavoritesButton">⭐ Favorites</button>
  </section>

  <section id="addBookScreen" class="hidden">
    <button type="button" id="backFromAdd">← Back</button>
    <div id="scanner"></div>

    <form id="bookForm" onsubmit="return false;">
      <label>Title</label>
      <input name="title" required />

      <label>Authors</label>
      <input name="authors" />

      <label>Status</label>
      <select name="status" id="status"></select>

      <label>Shelf / Location</label>
      <select name="location" id="location"></select>

      <label>Rating</label>
      <input name="rating" type="number" min="0" max="5" step="0.25" />

      <label>Genre</label>
      <select name="genre" id="genre"></select>

      <label>Favorite</label>
      <select name="favorite" id="favorite"></select>

      <label>Duplicate Type</label>
      <select name="duplicateType" id="duplicateType"></select>

      <label>Notes</label>
      <textarea name="notes"></textarea>

      <label>ISBN-13</label>
      <input name="isbn13" />

      <input type="hidden" name="publisher" />
      <input type="hidden" name="publishedDate" />
      <input type="hidden" name="pageCount" />
      <input type="hidden" name="categories" />
      <input type="hidden" name="coverUrl" />
      <input type="hidden" name="googleBooksLink" />
      <input type="hidden" name="description" />

      <button type="button" id="submitBook">Add Book</button>
    </form>
  </section>

  <section id="libraryScreen" class="hidden">
    <button type="button" id="backFromLibrary">← Back</button>
    <h2>Library</h2>
    <input id="librarySearch" placeholder="Search title, author, genre, location..." />
    <div id="libraryList"></div>
  </section>

  <section id="favoritesScreen" class="hidden">
    <button type="button" id="backFromFavorites">← Back</button>
    <h2>Favorites</h2>
    <div id="favoritesList"></div>
  </section>
  
  <section id="detailScreen" class="hidden">
    <button type="button" id="backFromDetail">← Back</button>
    <div id="bookDetail"></div>
  </section>
  
  <div class="status" id="message"></div>
  <div class="version">VERSION V2-001</div>
</main>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="/library/app.js"></script>
</body>
</html>
